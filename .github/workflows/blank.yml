name: Test Projects

on:
  pull_request:
    types:
      - opened
    branches:
      - main
      - 'dev-*'
      - 'feat/**'

  workflow_dispatch:

  push:
    branches:
      - main
      - 'dev-*'
      - 'feat/**'
    paths-ignore:
      - '.github/workflows/*'


jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: Test code
        run: npm test


  build:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      script_file: ${{ steps.publish.outputs.script_file }}

    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Publish JS filename
        id: publish
        run: |
          file=$(find dist/assets/*.js -type f)
          echo "script_file=$file" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: |
            dist
            package.json


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Get JS filename
        run: 'echo "JS File: ${{ needs.build.outputs.script_file }}"'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files

      - name: Deploy
        run: echo "Deploying..."